[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = postgresql://aibroker:placeholder@localhost:5434/aibroker

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
