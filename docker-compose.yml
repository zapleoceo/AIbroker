name: aibroker

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aibroker-postgres
    environment:
      POSTGRES_USER: aibroker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: aibroker
    volumes:
      - aibroker_pgdata:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibroker -d aibroker"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: {driver: json-file, options: {max-size: 10m, max-file: 3}}

  # Connection pooler between the app and Postgres. Transaction pooling: a
  # server backend is held only for the duration of a transaction, so ~15 real
  # connections serve hundreds of client ones (threshold rationale in
  # docs/deploy-ops.md "Connection scaling"). MAX_PREPARED_STATEMENTS lets
  # asyncpg's protocol-level prepared statements survive transaction pooling
  # (pgbouncer >= 1.21). AUTH_TYPE plain is confined to the compose-internal
  # network (no published ports); pgbouncer still answers Postgres' SCRAM
  # challenge upstream with the same secret. The deep-jobs LISTEN connection
  # bypasses this via DIRECT_DATABASE_URL (NOTIFY needs a pinned backend).
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: aibroker-pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://aibroker:${POSTGRES_PASSWORD}@postgres:5432/aibroker
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "15"
      MIN_POOL_SIZE: "3"
      MAX_PREPARED_STATEMENTS: "500"
      AUTH_TYPE: plain
      LISTEN_PORT: "6432"
    restart: unless-stopped
    logging: {driver: json-file, options: {max-size: 10m, max-file: 3}}

  # Cross-worker selector state (affinity + saturation verdicts) — pure cache
  # semantics: LRU-evicted, never persisted, and the app fails open to its
  # in-process dicts if this container is down. No published ports on purpose.
  redis:
    image: redis:7-alpine
    container_name: aibroker-redis
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    restart: unless-stopped
    logging: {driver: json-file, options: {max-size: 10m, max-file: 3}}

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aibroker-api
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://aibroker:${POSTGRES_PASSWORD}@pgbouncer:6432/aibroker
      DIRECT_DATABASE_URL: postgresql+asyncpg://aibroker:${POSTGRES_PASSWORD}@postgres:5432/aibroker
      REDIS_URL: redis://redis:6379/0
      TOKEN_SECRET: ${TOKEN_SECRET:?TOKEN_SECRET must be set}
      ADMIN_KEY: ${ADMIN_KEY:?ADMIN_KEY must be set}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET must be set}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID:-0}
      SESSION_SECRET: ${SESSION_SECRET:-}
      GLOBAL_DAILY_CAP_USD: ${GLOBAL_DAILY_CAP_USD:-20.0}
      PUBLIC_HOST: ${PUBLIC_HOST:-aib.zapleo.com}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:8004:8000"
    restart: unless-stopped
    logging: {driver: json-file, options: {max-size: 10m, max-file: 3}}

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aibroker-monitor
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      pgbouncer:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://aibroker:${POSTGRES_PASSWORD}@pgbouncer:6432/aibroker
      DIRECT_DATABASE_URL: postgresql+asyncpg://aibroker:${POSTGRES_PASSWORD}@postgres:5432/aibroker
      REDIS_URL: redis://redis:6379/0
      TOKEN_SECRET: ${TOKEN_SECRET}
      ADMIN_KEY: ${ADMIN_KEY}            # not used by monitor, but Settings requires it
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MONITOR_INTERVAL_S: "600"
    command: ["python", "-m", "aibroker.monitor"]
    # No HTTP server here — the Dockerfile HEALTHCHECK curls :8000, which this
    # worker never binds, so it would report a permanently-false "unhealthy".
    healthcheck:
      disable: true
    restart: unless-stopped
    logging: {driver: json-file, options: {max-size: 10m, max-file: 3}}

volumes:
  aibroker_pgdata:
    driver: local
