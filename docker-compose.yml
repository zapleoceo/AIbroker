name: aibroker

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aibroker-postgres
    environment:
      POSTGRES_USER: aibroker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: aibroker
    volumes:
      - aibroker_pgdata:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibroker -d aibroker"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: {driver: json-file, options: {max-size: 10m, max-file: 3}}

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aibroker-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://aibroker:${POSTGRES_PASSWORD}@postgres:5432/aibroker
      TOKEN_SECRET: ${TOKEN_SECRET:?TOKEN_SECRET must be set}
      ADMIN_KEY: ${ADMIN_KEY:?ADMIN_KEY must be set}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET must be set}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID:-0}
      GLOBAL_DAILY_CAP_USD: ${GLOBAL_DAILY_CAP_USD:-20.0}
      DEFAULT_LEASE_SECONDS: ${DEFAULT_LEASE_SECONDS:-60}
      PUBLIC_HOST: ${PUBLIC_HOST:-aib.zapleo.com}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:8004:8000"
    restart: unless-stopped
    logging: {driver: json-file, options: {max-size: 10m, max-file: 3}}

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aibroker-monitor
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://aibroker:${POSTGRES_PASSWORD}@postgres:5432/aibroker
      TOKEN_SECRET: ${TOKEN_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MONITOR_INTERVAL_S: "600"
    command: ["python", "-m", "aibroker.monitor"]
    restart: unless-stopped
    logging: {driver: json-file, options: {max-size: 10m, max-file: 3}}

volumes:
  aibroker_pgdata:
    driver: local
