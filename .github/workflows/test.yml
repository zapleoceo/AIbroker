name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e .[dev]
      - name: Lint
        run: ruff check src tests || true
      - name: Test
        run: |
          PYTHONPATH=src TOKEN_SECRET=$(python -c "from cryptography.fernet import Fernet;print(Fernet.generate_key().decode())") \
            ADMIN_KEY=admin_test_key_for_ci_only \
            INTERNAL_SECRET=internal_test_secret \
            DATABASE_URL="sqlite+aiosqlite:///:memory:" \
            pytest -x --cov=aibroker --cov-report=term-missing
