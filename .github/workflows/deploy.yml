name: Deploy aibroker to Hetzner

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: aibroker-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .[dev]
      - name: Ruff (non-blocking)
        continue-on-error: true
        run: ruff check src tests
      - name: Pytest with coverage
        env:
          TOKEN_SECRET: ZmtNeUVQR1RaQVF1bFlBd2hLbFNFLW9PRGxKa0tlSVMtTjFJNTlhRkFLST0=
          ADMIN_KEY: admin_test_key_for_ci_only
          INTERNAL_SECRET: internal_test_secret
          DATABASE_URL: sqlite+aiosqlite:///:memory:
        run: |
          PYTHONPATH=src pytest -x \
            --cov=aibroker --cov-report=term-missing \
            --cov-fail-under=40

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HOST: ${{ secrets.HETZNER_HOST }}
      PORT: ${{ secrets.HETZNER_PORT || '9617' }}

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Trigger restricted deploy
        # The SSH key is wired to `command="/usr/local/bin/aibroker-deploy"` on
        # the server — connecting at all runs git-pull + compose up. Any other
        # command the client passes is ignored. Worst-case key leak = attacker
        # can re-run our own deploy, nothing else (no shell, no file access).
        run: |
          ssh -p "$PORT" -o ServerAliveInterval=30 \
              -o BatchMode=yes -o ConnectTimeout=15 \
              root@"$HOST"

      - name: HTTPS probe (best-effort)
        run: |
          curl -sf -o /dev/null -w "HTTPS aib.zapleo.com → %{http_code}\n" \
            https://aib.zapleo.com/healthz || \
            echo "(CF probe failed — likely SSL mode mismatch, not deploy issue)"

      - name: Notify failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_VERA }}
          OWNER_ID: ${{ secrets.OWNER_TELEGRAM_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$BOT_TOKEN" ] && exit 0
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
               -d "chat_id=${OWNER_ID}" \
               -d "parse_mode=HTML" \
               -d "text=⚠️ aibroker deploy failed%0A${RUN_URL}" \
               -o /dev/null || true

