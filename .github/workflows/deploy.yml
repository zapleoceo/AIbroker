name: Deploy aibroker

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: aibroker-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .[dev]
      - name: Ruff
        continue-on-error: true
        run: ruff check src tests
      - name: Pytest
        env:
          ADMIN_KEY: admin_test_key_for_ci_only
          INTERNAL_SECRET: internal_test_secret
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        run: |
          export TOKEN_SECRET=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          # Coverage gate stair-step. Raise as we add tests; never drop.
          # 2026-06-24: 18 → 20 → 23 → 27 → 30 (after telemetry tests, 62 passed)
          PYTHONPATH=src pytest -x --cov=aibroker --cov-fail-under=30

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HOST: ${{ secrets.HETZNER_HOST }}
      PORT: ${{ secrets.HETZNER_PORT || '9617' }}
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}
      - name: Trust host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts
      - name: Trigger restricted deploy
        run: ssh -p "$PORT" -o BatchMode=yes -o ConnectTimeout=15 root@"$HOST"
      - name: Probe via Cloudflare
        run: |
          curl -sf -o /dev/null https://aib.zapleo.com/healthz \
            || echo "CF probe failed but origin OK"
      - name: Notify on failure
        if: failure()
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN_VERA }}
          OWNER: ${{ secrets.OWNER_TELEGRAM_ID }}
          RUN: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$BOT" ] && exit 0
          curl -s "https://api.telegram.org/bot$BOT/sendMessage" \
               -d "chat_id=$OWNER" \
               -d "text=aibroker deploy failed $RUN" \
               -o /dev/null || true
